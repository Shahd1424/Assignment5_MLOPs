name: ML Model CI

on:
  push:
    branches-ignore:
      - main

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Linter Check
        run: echo "Running linter..."

      - name: Model Dry Test
        run: python -c "print('Model environment ready!')"

      - name: Upload Readme
        uses: actions/upload-artifact@v4
        with:
          name: project-doc
          path: README.md