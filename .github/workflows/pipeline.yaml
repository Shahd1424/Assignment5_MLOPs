name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:

  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Linter
        run: echo "Running linter..."


  train:
    needs: linter
    runs-on: ubuntu-latest

    if: >
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Train Model
        id: train
        run: |
          echo "Starting training..."
          exit 1

      # ✅ ALWAYS CREATE LOG (حتى لو فشل)
      - name: Create error log
        if: always()
        run: |
          echo "==== TRAIN REPORT ====" > error_logs.txt
          echo "Train outcome: ${{ steps.train.outcome }}" >> error_logs.txt
          echo "Commit: ${{ github.event.head_commit.message }}" >> error_logs.txt
          echo "Branch: ${{ github.ref }}" >> error_logs.txt
          echo "Status captured successfully" >> error_logs.txt

      # ✅ ALWAYS UPLOAD ARTIFACT (مهم جدًا)
      - name: Upload error log
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: error-logs
          path: error_logs.txt

      # ✅ ALWAYS RUN CLEANUP
      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."
